<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Divisibility Check</h2>

    <button type="submit" onclick="checkNumber()">Print Message </button>
</body>
<script>
    function checkNumber() {

        for (let i = 1; i <= 100; i++) {

            if (i % 3 == 0 && i % 5 == 0)
                document.write(i + " : Number is divisible by 3 and 5 both<br>");

            else if (i % 3 == 0)
                document.write(i + " : Number is divisible by 3<br>");

            else if (i % 5 == 0)
                document.write(i + " : Number is divisible by 5<br>");

        }

    }
</script>
</html>
