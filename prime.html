<!DOCTYPE html>
<html>
<head>
    <title>Prime Number in Range</title>
</head>
<body>
    Enter First Number:
    <input type="text" id="n1">
    <br><br>
    Enter Second Number:
    <input type="text" id="n2">
    <br><br>
    <button onclick="checkPrimeRange()">Check</button>

</body>

<script>
    function checkPrimeRange() {

        let n1 = parseInt(document.getElementById("n1").value);
        let n2 = parseInt(document.getElementById("n2").value);

        let found = false;

        for (let i = n1; i <= n2; i++) {

            let prime = true;

            if (i < 2)
                prime = false;

            for (let j = 2; j < i; j++) {
                if (i % j == 0) {
                    prime = false;
                    break;
                }
            }

            if (prime) {
                found = true;
                break;
            }
        }

        if (found)
            alert(true);
        else
            alert(false);
    }
</script>
</html>
