<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Square and Cube</h3>
    Enter a Number :
    <input type="text" id="num">
    <br>
    <button type="submit" onclick="square()">Square</button>
    <button type="submit" onclick="cube()">Cube</button>
</body>
<script>
    function square() {
        let num = document.getElementById("num").value;
        let square = num*num;
        alert(`Square is ${square}`)
    }
    function cube() {
        let num = document.getElementById("num").value;
        let cube = num*num*num;
        alert(`Cube is ${cube}`)
    }
</script>
</html>
